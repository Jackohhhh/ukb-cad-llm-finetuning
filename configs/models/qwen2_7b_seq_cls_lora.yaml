model_name_or_path: Qwen/Qwen2-7B-Instruct
tokenizer_name_or_path: Qwen/Qwen2-7B-Instruct
cache_dir: null
num_labels: 2
load_in_4bit: true
load_in_8bit: false
device_map: null
padding_side: right
use_custom_binary_head: false
head_trainable_patterns:
  - classifier
  - score
  - head
lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  modules_to_save:
    - score
